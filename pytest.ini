[pytest]
pythonpath = .
testpaths = ./tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    integration: Redis 실제 연결 통합 테스트
    smoke: Prod 배포 후 스모크 테스트

# Coverage settings
addopts = --cov=modules --cov=core --cov-report=term-missing --cov-report=html:coverage_html --cov-fail-under=60

# Warning filters
filterwarnings =
    default
    ignore::aiomysql.cursors.Warning
    ignore:Duplicate entry:Warning