###############################################################################
# Backend Rollback — Lambda Alias 즉시 롤백
#
# 수동 트리거: 환경 선택 + 롤백 대상 버전 (비우면 직전 버전)
###############################################################################

name: Backend Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "롤백 대상 환경"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      target_version:
        description: "롤백할 Lambda 버전 번호 (비우면 직전 버전으로 롤백)"
        required: false
        type: string

concurrency:
  group: backend-rollback-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-northeast-2
      LAMBDA_FUNCTION: my-community-${{ inputs.environment }}-backend

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/my-community-${{ inputs.environment }}-github-actions
          role-session-name: backend-rollback-${{ inputs.environment }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Current Alias Info
        id: current
        run: |
          ALIAS_INFO=$(aws lambda get-alias \
            --function-name "$LAMBDA_FUNCTION" \
            --name "live" \
            --region "$AWS_REGION" \
            --output json)

          CURRENT_VERSION=$(echo "$ALIAS_INFO" | jq -r '.FunctionVersion')
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current 'live' alias points to version: $CURRENT_VERSION"

      - name: Determine Rollback Target
        id: target
        env:
          INPUT_VERSION: ${{ inputs.target_version }}
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            if ! [[ "$INPUT_VERSION" =~ ^[0-9]+$ ]]; then
              echo "::error::target_version must be a positive integer"
              exit 1
            fi
            TARGET="$INPUT_VERSION"
          else
            TARGET=$(( CURRENT_VERSION - 1 ))
          fi

          if [ "$TARGET" -lt 1 ]; then
            echo "::error::Cannot rollback: no previous version (current is version 1)"
            exit 1
          fi

          aws lambda get-function \
            --function-name "$LAMBDA_FUNCTION" \
            --qualifier "$TARGET" \
            --region "$AWS_REGION" > /dev/null 2>&1 || {
            echo "::error::Lambda version $TARGET does not exist"
            exit 1
          }

          echo "version=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Rollback target: version $TARGET"

      - name: Health Check Rollback Target
        env:
          TARGET_VERSION: ${{ steps.target.outputs.version }}
        run: |
          PAYLOAD='{"version":"2.0","routeKey":"GET /health","rawPath":"/health","requestContext":{"http":{"method":"GET","path":"/health"},"routeKey":"GET /health"},"isBase64Encoded":false}'

          aws lambda invoke \
            --function-name "$LAMBDA_FUNCTION" \
            --qualifier "$TARGET_VERSION" \
            --cli-binary-format raw-in-base64-out \
            --payload "$PAYLOAD" \
            --region "$AWS_REGION" \
            /tmp/health_response.json > /dev/null 2>&1

          STATUS=$(cat /tmp/health_response.json | jq -r '.statusCode')
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned status $STATUS — proceeding with rollback anyway"
          else
            echo "Health check passed (status: $STATUS)"
          fi

      - name: Rollback Alias
        env:
          TARGET_VERSION: ${{ steps.target.outputs.version }}
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
        run: |
          aws lambda update-alias \
            --function-name "$LAMBDA_FUNCTION" \
            --name "live" \
            --function-version "$TARGET_VERSION" \
            --region "$AWS_REGION"

          echo "Rolled back: version $CURRENT_VERSION → $TARGET_VERSION"
