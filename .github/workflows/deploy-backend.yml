###############################################################################
# Backend CD — Docker Build → ECR Push → Lambda Update
#
# 수동 트리거: workflow_dispatch로 환경 선택 후 배포
# 인증: GitHub Actions OIDC → AWS IAM Role
#
# 사전 설정:
#   - Repository variable: AWS_ACCOUNT_ID (12자리 AWS 계정 ID)
#   - GitHub Environments: dev, staging, prod (선택적으로 required reviewers 설정)
#   - Bootstrap에서 OIDC provider + IAM role 생성 완료
###############################################################################

name: Backend CD — ECR + Lambda

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "배포 환경"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: backend-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write   # OIDC 토큰 발급
      contents: read

    env:
      AWS_REGION: ap-northeast-2
      ECR_REPOSITORY: my-community-${{ inputs.environment }}-backend
      LAMBDA_FUNCTION: my-community-${{ inputs.environment }}-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/my-community-${{ inputs.environment }}-github-actions
          role-session-name: backend-deploy-${{ inputs.environment }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # --provenance=false 필수: Lambda가 Docker buildx OCI attestation manifest를 거부
      # SHA 태그 + latest 태그 병행: 롤백 가능 + 기존 전략 유지
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker build --provenance=false \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      # SHA 태그로 Lambda 업데이트 (불변 태그 → 동시 배포 시 race condition 방지)
      # --publish로 번호 매긴 버전 생성 → 헬스 체크 후 alias 전환 (Blue/Green)
      - name: Update Lambda Function and Publish Version
        id: lambda-update
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          RESULT=$(aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION" \
            --image-uri "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --publish \
            --region "$AWS_REGION" \
            --output json)

          NEW_VERSION=$(echo "$RESULT" | jq -r '.Version')
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Published Lambda version: $NEW_VERSION"

      # Lambda 함수 업데이트가 완료될 때까지 대기
      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION" \
            --region "$AWS_REGION"
          echo "Lambda function updated successfully"

      # 새 버전에 직접 헬스 체크 — 실패 시 alias 전환 차단 (프로덕션 트래픽 보호)
      - name: Health Check New Version
        env:
          NEW_VERSION: ${{ steps.lambda-update.outputs.new_version }}
        run: |
          PAYLOAD='{"version":"2.0","routeKey":"GET /health","rawPath":"/health","requestContext":{"http":{"method":"GET","path":"/health"},"routeKey":"GET /health"},"isBase64Encoded":false}'

          RESPONSE=$(aws lambda invoke \
            --function-name "$LAMBDA_FUNCTION" \
            --qualifier "$NEW_VERSION" \
            --cli-binary-format raw-in-base64-out \
            --payload "$PAYLOAD" \
            --region "$AWS_REGION" \
            /tmp/health_response.json 2>&1)

          echo "Invoke response: $RESPONSE"

          FUNC_ERROR=$(echo "$RESPONSE" | jq -r '.FunctionError // empty')
          if [ -n "$FUNC_ERROR" ]; then
            echo "::error::Lambda execution error: $FUNC_ERROR"
            cat /tmp/health_response.json
            exit 1
          fi

          STATUS=$(cat /tmp/health_response.json | jq -r '.statusCode')
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with status: $STATUS"
            cat /tmp/health_response.json
            exit 1
          fi

          echo "Health check passed (status: $STATUS)"

      # 헬스 체크 통과 후 live alias를 새 버전으로 전환 (Blue/Green 완료)
      - name: Switch Traffic to New Version
        env:
          NEW_VERSION: ${{ steps.lambda-update.outputs.new_version }}
        run: |
          PREV_VERSION=$(aws lambda get-alias \
            --function-name "$LAMBDA_FUNCTION" \
            --name "live" \
            --region "$AWS_REGION" \
            --query 'FunctionVersion' --output text 2>/dev/null || echo "none")

          aws lambda update-alias \
            --function-name "$LAMBDA_FUNCTION" \
            --name "live" \
            --function-version "$NEW_VERSION" \
            --region "$AWS_REGION" 2>/dev/null || \
          aws lambda create-alias \
            --function-name "$LAMBDA_FUNCTION" \
            --name "live" \
            --function-version "$NEW_VERSION" \
            --region "$AWS_REGION"

          echo "Alias 'live' switched: version $PREV_VERSION → $NEW_VERSION"
