###############################################################################
# K8s CD — Backend Docker Build → ECR Push → kubectl rollout
#
# 수동 트리거: workflow_dispatch로 컴포넌트 선택 후 배포
# 인증: GitHub Actions OIDC → AWS IAM Role (ECR push + SG 관리)
# kubectl: Master 노드에서 직접 실행 (SSH)
# SSH SG: runner IP를 동적 추가/삭제 (GitHub Actions IP가 매번 변경)
#
# 사전 설정:
#   - Repository variable: AWS_ACCOUNT_ID
#   - Environment secrets: K8S_MASTER_SSH_KEY, K8S_MASTER_HOST, K8S_SSH_SG_ID
###############################################################################

name: K8s CD — Backend

on:
  workflow_dispatch:
    inputs:
      component:
        description: "배포 컴포넌트"
        required: true
        type: choice
        options:
          - api
          - ws
          - all
      environment:
        description: "배포 환경"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: k8s-deploy-${{ inputs.environment }}-${{ inputs.component }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: "Build & Push (${{ inputs.component }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/my-community-${{ inputs.environment }}-github-actions
          aws-region: ap-northeast-2

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend-k8s
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/my-community-${{ inputs.environment }}-backend-k8s"
          TAG="${{ steps.meta.outputs.tag }}"
          docker build --provenance=false -f Dockerfile -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  deploy:
    name: "Deploy (${{ inputs.component }})"
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/my-community-${{ inputs.environment }}-github-actions
          aws-region: ap-northeast-2

      - name: Allow SSH from runner IP
        id: sg
        env:
          SG_ID: ${{ secrets.K8S_SSH_SG_ID }}
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "${SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --tag-specifications "ResourceType=security-group-rule,Tags=[{Key=Purpose,Value=github-actions-deploy}]" || true
          sleep 5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K8S_MASTER_HOST }}
          username: ec2-user
          key: ${{ secrets.K8S_MASTER_SSH_KEY }}
          script: |
            TAG="${{ needs.build-and-push.outputs.image_tag }}"
            REGISTRY="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com"
            COMPONENT="${{ inputs.component }}"
            ENV="${{ inputs.environment }}"

            if [ "${COMPONENT}" = "api" ] || [ "${COMPONENT}" = "all" ]; then
              kubectl set image deployment/community-api \
                community-api="${REGISTRY}/my-community-${ENV}-backend-k8s:${TAG}" -n app
              kubectl rollout status deployment/community-api -n app --timeout=120s
            fi

            if [ "${COMPONENT}" = "ws" ] || [ "${COMPONENT}" = "all" ]; then
              kubectl set image deployment/community-ws \
                community-ws="${REGISTRY}/my-community-${ENV}-backend-k8s:${TAG}" -n app
              kubectl rollout status deployment/community-ws -n app --timeout=120s
            fi

      - name: Set health check URL
        id: health
        run: |
          case "${{ inputs.environment }}" in
            dev)     echo "url=https://api.my-community.shop/health" >> "$GITHUB_OUTPUT" ;;
            staging) echo "url=https://api-staging.my-community.shop/health" >> "$GITHUB_OUTPUT" ;;
            prod)    echo "url=https://api.my-community.shop/health" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.health.outputs.url }}" || true)
          if [ "${STATUS}" = "200" ]; then
            echo "Health check passed"
          else
            echo "Warning: Health check returned ${STATUS}"
          fi

      - name: Revoke SSH from runner IP
        if: always()
        env:
          SG_ID: ${{ secrets.K8S_SSH_SG_ID }}
          RUNNER_IP: ${{ steps.sg.outputs.runner_ip }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" || true
