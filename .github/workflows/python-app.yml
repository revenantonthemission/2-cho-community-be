name: Backend CI — Test

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'database/**'
      - '.github/workflows/python-app.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'database/**'
      - '.github/workflows/python-app.yml'
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:9.6
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: community_service
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --frozen --extra dev

    - name: Wait for MySQL
      run: |
        while ! mysqladmin ping -h 127.0.0.1 --silent; do
          sleep 1
        done

    - name: Initialize database schema
      env:
        MYSQL_PWD: testpassword
      run: |
        mysql -h 127.0.0.1 -u root community_service < database/schema.sql

    - name: Run tests
      env:
        DB_HOST: "127.0.0.1"
        DB_PORT: "3306"
        DB_USER: "root"
        DB_PASSWORD: "testpassword"
        DB_NAME: "community_service"
        SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}-ci-secret
        TESTING: "true"
      run: uv run pytest -m "not smoke and not integration" --cov --cov-report=term-missing
